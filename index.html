<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Report Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--steel:#1e1e1e;
  --red:#d42b2b;--white:#f0f0f0;--chrome:#aaa;--dim:#555;--border:rgba(255,255,255,0.07);
  --green:#2aaa55;--amber:#e8a800;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:2rem;}

.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99999;padding:2rem;}
.login-screen.hidden{display:none;}
.login-box{background:var(--surface);border:1px solid var(--border);width:100%;max-width:360px;overflow:hidden;}
.login-header{background:var(--card);padding:1.8rem;text-align:center;border-bottom:1px solid var(--border);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.2em;color:var(--white);}
.login-logo span{color:var(--red);}
.login-sub{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;}
.login-body{padding:1.8rem;}
.login-field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.login-field label{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.login-field input{background:var(--steel);border:1px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:1rem;padding:0.75rem 1rem;outline:none;-webkit-appearance:none;width:100%;transition:border-color 0.15s;}
.login-field input:focus{border-color:var(--red);}
.login-btn{width:100%;background:var(--red);color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:0.2em;text-transform:uppercase;padding:0.9rem;cursor:pointer;min-height:48px;touch-action:manipulation;}
.login-btn:active{background:#ff3b3b;}
.login-error{color:#ff6b6b;font-size:0.8rem;text-align:center;margin-top:0.75rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;display:none;}
.login-error.show{display:block;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.1em;}
.topbar-actions{display:flex;gap:0.75rem;align-items:center;}
.sync-status{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;border:none;padding:0.55rem 1.2rem;cursor:pointer;transition:all 0.15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:40px;}
.btn-ghost{background:transparent;color:var(--chrome);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--chrome);color:var(--white);}
.btn-red{background:var(--red);color:#fff;}

.filters{padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:0.3rem;}
.filter-group label{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.filter-group input,.filter-group select{background:var(--card);border:1px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:0.85rem;padding:0.45rem 0.75rem;outline:none;-webkit-appearance:none;}
.filter-group input:focus,.filter-group select:focus{border-color:var(--red);}

.content{padding:1.5rem;max-width:1000px;margin:0 auto;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border:1px solid var(--border);padding:1rem 1.2rem;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.stat-card.red::before{background:var(--red);}
.stat-card.green::before{background:var(--green);}
.stat-card.amber::before{background:var(--amber);}
.stat-card.blue::before{background:#2a7aaa;}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-bottom:0.4rem;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;}
.stat-card.red .stat-value{color:var(--red);}
.stat-card.green .stat-value{color:var(--green);}
.stat-card.amber .stat-value{color:var(--amber);}
.stat-card.blue .stat-value{color:#2a7aaa;}

.report-card{background:var(--card);border:1px solid var(--border);margin-bottom:1rem;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.report-card:hover{border-color:rgba(212,43,43,0.4);}
.report-head{padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.report-info{flex:1;}
.report-reg{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.1em;color:var(--white);}
.report-customer{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:0.1em;color:var(--chrome);margin-top:0.1rem;}
.report-meta{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:0.2rem;}
.report-pills{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;}
.pill{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.25rem 0.6rem;border-radius:2px;}
.pill-pass{background:rgba(42,170,85,0.15);color:var(--green);border:1px solid rgba(42,170,85,0.3);}
.pill-advisory{background:rgba(232,168,0,0.15);color:var(--amber);border:1px solid rgba(232,168,0,0.3);}
.pill-fail{background:rgba(212,43,43,0.15);color:#ff6b6b;border:1px solid rgba(212,43,43,0.3);}
.report-expand{font-size:1.2rem;color:var(--dim);transition:transform 0.2s;flex-shrink:0;}
.report-card.open .report-expand{transform:rotate(180deg);}

.report-detail{display:none;border-top:1px solid var(--border);}
.report-card.open .report-detail{display:block;}
.detail-section{padding:1rem 1.2rem;border-bottom:1px solid var(--border);}
.detail-section:last-child{border-bottom:none;}
.detail-title{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--red);margin-bottom:0.75rem;}

.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:0.75rem;}
.detail-cell{}
.detail-cell-label{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-bottom:0.2rem;}
.detail-cell-value{font-size:0.88rem;color:var(--white);}

.check-item{display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.check-item:last-child{border-bottom:none;}
.check-name{font-size:0.85rem;color:var(--chrome);}
.check-notes-text{font-size:0.78rem;color:var(--dim);margin-top:0.2rem;font-style:italic;}
.check-result{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.15rem 0.5rem;}

.work-item{display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.88rem;}
.work-item:last-child{border-bottom:none;}
.work-item-desc{color:var(--chrome);}
.work-item-cost{color:var(--red);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.05em;}
.work-total{display:flex;justify-content:flex-end;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.08);font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;color:var(--red);font-weight:700;margin-top:0.25rem;}

.advisory-box{background:rgba(232,168,0,0.08);border:1px solid rgba(232,168,0,0.2);padding:0.75rem 1rem;font-size:0.88rem;color:var(--chrome);line-height:1.6;}

/* PHOTO GALLERY */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));gap:0.6rem;}
.photo-item{background:var(--steel);border:1px solid var(--border);overflow:hidden;}
.photo-item img{width:100%;height:90px;object-fit:cover;display:block;cursor:pointer;background:#000;}
.photo-item-caption{font-size:0.7rem;color:var(--dim);padding:0.3rem 0.4rem;border-top:1px solid var(--border);line-height:1.3;min-height:1.6em;}
.photo-lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99998;align-items:center;justify-content:center;padding:1rem;cursor:zoom-out;}
.photo-lightbox.open{display:flex;}
.photo-lightbox img{max-width:100%;max-height:90vh;box-shadow:0 10px 40px rgba(0,0,0,0.6);}
.report-actions{padding:0.75rem 1.2rem;display:flex;gap:0.75rem;background:var(--steel);}

.empty{text-align:center;padding:4rem 1rem;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;}
.empty .e-icon{font-size:2.5rem;display:block;margin-bottom:1rem;}

.month-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.15em;color:var(--dim);padding:0.5rem 0 0.75rem;margin-top:0.5rem;}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr;}
  .filters{flex-direction:column;align-items:stretch;}
  .filter-group input,.filter-group select{width:100%;}
  .topbar{padding:0.75rem 1rem;}
  .content{padding:1rem;}
  .report-pills{flex-wrap:wrap;}
  .detail-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">SERVICE REPORT <span>TRACKER</span></div>
      <div class="login-sub">Staff Access Only</div>
    </div>
    <div class="login-body">
      <div class="login-field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" ontouchstart="doLogin()" onclick="doLogin()">Login</button>
      <div class="login-error" id="loginError">Incorrect username or password</div>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🩺 Service Report Tracker</div>
  <div class="topbar-actions">
    <span class="sync-status" id="syncStatus">Loading…</span>
    <button class="btn btn-ghost" onclick="exportCSV()">📥 Export CSV</button>
    <button class="btn btn-ghost" onclick="signOut()" style="border-color:rgba(212,43,43,0.4);color:var(--red);">Sign Out</button>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-group">
    <label>Search Reg / Customer</label>
    <input type="text" id="searchInput" placeholder="e.g. AB12 CDE" oninput="renderReports()">
  </div>
  <div class="filter-group">
    <label>Month</label>
    <select id="monthFilter" onchange="renderReports()">
      <option value="">All Months</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Result Filter</label>
    <select id="resultFilter" onchange="renderReports()">
      <option value="">All Reports</option>
      <option value="fail">Has Fails</option>
      <option value="advisory">Has Advisories</option>
      <option value="pass">All Pass</option>
    </select>
  </div>
  <div class="filter-group" style="margin-left:auto;">
    <label>&nbsp;</label>
    <button class="btn btn-ghost" onclick="if(confirm('Clear ALL local reports? Cloud data remains.')){ localStorage.removeItem(\'health_tracker\'); renderReports(); }" style="border-color:rgba(212,43,43,0.3);color:var(--red);font-size:0.72rem;">🗑 Clear Local</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="stats">
    <div class="stat-card blue">
      <div class="stat-label">Total Reports</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">All Pass</div>
      <div class="stat-value" id="stat-pass">0</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Has Advisories</div>
      <div class="stat-value" id="stat-adv">0</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Has Fails</div>
      <div class="stat-value" id="stat-fail">0</div>
    </div>
  </div>

  <div id="reportsList"></div>
</div>

<!-- PHOTO LIGHTBOX -->
<div class="photo-lightbox" id="photoLightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Photo preview">
</div>

<script>
const USERS = { 'stephen':'Autoservice2026', 'neil':'Autoservice2026' };

const SB = 'https://hzbwjjypdcejcwtwalsp.supabase.co/rest/v1';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6YndqanlwZGNlamN3dHdhbHNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTQ0NDcsImV4cCI6MjA5NjMzMDQ0N30.XCgZ2_3SRrJYwpm43rnsPTCnE_zT6x4VzILUF_AmR1M';
const SH = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

function setSyncStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = msg;
  el.style.color = color === 'green' ? 'var(--green)' : color === 'amber' ? 'var(--amber)' : 'var(--red)';
}

function localSave(reports) {
  try { localStorage.setItem('health_tracker', JSON.stringify(reports)); } catch(e){}
}

function loadReports() {
  try {
    const saved = localStorage.getItem('health_tracker');
    if(!saved) return [];
    const parsed = JSON.parse(saved);
    // Parse any stringified checks/workItems
    return parsed.map(r => ({
      ...r,
      checks: typeof r.checks === 'string' ? JSON.parse(r.checks) : (r.checks || []),
      workItems: typeof r.workItems === 'string' ? JSON.parse(r.workItems) : (r.workItems || [])
    }));
  } catch(e) { return []; }
}

function pullReports() {
  fetch(SB+'/reports?order=savedAt.desc', {headers:SH})
    .then(r=>r.json())
    .then(rows=>{
      if(!Array.isArray(rows)) return;
      const parsed = rows.map(r=>({
        ...r,
        checks: typeof r.checks==='string' ? tryParse(r.checks, []) : (r.checks||[]),
        workItems: typeof r.workItems==='string' ? tryParse(r.workItems, []) : (r.workItems||[])
      }));

      // Merge with local: cloud wins for same ID, keep local-only records
      const local = loadReports();
      const cloudIds = new Set(parsed.map(r=>r.id));
      const localOnly = local.filter(r=>!cloudIds.has(r.id));
      const merged = [...parsed, ...localOnly].sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
      localSave(merged);
      renderReports();
      setSyncStatus('☁️ Live & Synced', 'green');
    })
    .catch(()=>{ setSyncStatus('📱 Local only', 'amber'); });
}

function tryParse(str, fallback) {
  try { return JSON.parse(str); } catch(e) { return fallback; }
}

function deleteReport(id) {
  if(!confirm('Delete this report? This cannot be undone.')) return;
  let reports = loadReports();
  reports = reports.filter(r=>r.id!==id);
  localSave(reports);
  fetch(SB+'/reports?id=eq.'+encodeURIComponent(id), {method:'DELETE', headers:SH}).catch(()=>{});
  renderReports();
}

function populateMonthFilter(reports) {
  const months = [...new Set(reports.map(r=>(r.date||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const sel = document.getElementById('monthFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="">All Months</option>';
  months.forEach(m => {
    const [y,mo] = m.split('-');
    const label = new Date(y, mo-1).toLocaleString('default',{month:'long',year:'numeric'});
    sel.innerHTML += `<option value="${m}" ${m===current?'selected':''}>${label}</option>`;
  });
}

function renderReports() {
  const reports = loadReports();
  const search = document.getElementById('searchInput').value.toLowerCase();
  const month = document.getElementById('monthFilter').value;
  const result = document.getElementById('resultFilter').value;

  populateMonthFilter(reports);

  document.getElementById('stat-total').textContent = reports.length;
  document.getElementById('stat-pass').textContent = reports.filter(r=>(r.fail||0)===0&&(r.advisory||0)===0&&(r.pass||0)>0).length;
  document.getElementById('stat-adv').textContent = reports.filter(r=>(r.advisory||0)>0).length;
  document.getElementById('stat-fail').textContent = reports.filter(r=>(r.fail||0)>0).length;

  let filtered = reports.filter(r => {
    if(search && !(r.reg||'').toLowerCase().includes(search) && !(r.customer||'').toLowerCase().includes(search)) return false;
    if(month && !(r.date||'').startsWith(month)) return false;
    if(result==='fail' && !(r.fail>0)) return false;
    if(result==='advisory' && !(r.advisory>0)) return false;
    if(result==='pass' && (r.fail>0||r.advisory>0)) return false;
    return true;
  });

  const container = document.getElementById('reportsList');

  if(!filtered.length) {
    container.innerHTML = `<div class="empty"><span class="e-icon">🩺</span>No reports found<br><br>Fill in a service report and tap "Save to Tracker" to see it here.</div>`;
    return;
  }

  // Group by month
  const grouped = {};
  filtered.forEach(r => {
    const m = (r.date||'unknown').slice(0,7);
    if(!grouped[m]) grouped[m] = [];
    grouped[m].push(r);
  });

  let html = '';
  Object.keys(grouped).sort().reverse().forEach(m => {
    let label = m;
    if(m !== 'unknown') {
      const [y,mo] = m.split('-');
      label = new Date(y, mo-1).toLocaleString('default',{month:'long',year:'numeric'});
    }
    html += `<div class="month-label">📅 ${label} — ${grouped[m].length} report${grouped[m].length!==1?'s':''}</div>`;

    grouped[m].forEach(r => {
      const allPass = (r.fail||0)===0 && (r.advisory||0)===0 && (r.pass||0)>0;
      const workItems = r.workItems || [];
      const grandTotal = r.grandTotal || workItems.reduce((a,i)=>a+(i.cost||0),0)*1.2;

      html += `
      <div class="report-card" id="card-${r.id}">
        <div class="report-head" onclick="toggleCard('${r.id}')">
          <div class="report-info">
            <div class="report-reg">${r.reg||'Unknown'}</div>
            <div class="report-customer">${r.customer||'Unknown customer'} ${r.makeModel?'· '+r.makeModel:''}</div>
            <div class="report-meta">${r.date||'No date'} ${r.techName?'· Tech: '+r.techName:''} ${grandTotal>0?'· Total: £'+grandTotal.toFixed(2):''}</div>
          </div>
          <div class="report-pills">
            ${(r.pass||0)>0?`<span class="pill pill-pass">✓ ${r.pass} Pass</span>`:''}
            ${(r.advisory||0)>0?`<span class="pill pill-advisory">⚠ ${r.advisory} Advisory</span>`:''}
            ${(r.fail||0)>0?`<span class="pill pill-fail">✗ ${r.fail} Fail</span>`:''}
            ${allPass?`<span class="pill pill-pass">✅ All Clear</span>`:''}
            ${(r.photos&&r.photos.length)?`<span class="pill" style="background:rgba(170,170,170,0.12);color:var(--chrome);border:1px solid var(--border);">📷 ${r.photos.length}</span>`:''}
          </div>
          <div class="report-expand">▼</div>
        </div>
        <div class="report-detail">

          <!-- Vehicle details -->
          <div class="detail-section">
            <div class="detail-title">Vehicle Details</div>
            <div class="detail-grid">
              ${r.reg?`<div class="detail-cell"><div class="detail-cell-label">Registration</div><div class="detail-cell-value" style="font-weight:700;">${r.reg}</div></div>`:''}
              ${r.makeModel?`<div class="detail-cell"><div class="detail-cell-label">Make & Model</div><div class="detail-cell-value">${r.makeModel}</div></div>`:''}
              ${r.carYear?`<div class="detail-cell"><div class="detail-cell-label">Year</div><div class="detail-cell-value">${r.carYear}</div></div>`:''}
              ${r.mileage?`<div class="detail-cell"><div class="detail-cell-label">Mileage</div><div class="detail-cell-value">${r.mileage}</div></div>`:''}
              ${r.serviceType?`<div class="detail-cell"><div class="detail-cell-label">Service Type</div><div class="detail-cell-value">${r.serviceType}</div></div>`:''}
              ${r.techName?`<div class="detail-cell"><div class="detail-cell-label">Technician</div><div class="detail-cell-value">${r.techName}</div></div>`:''}
            </div>
          </div>

          <!-- Work carried out -->
          ${workItems.length ? `
          <div class="detail-section">
            <div class="detail-title">Work Carried Out</div>
            ${workItems.map(w=>`
              <div class="work-item">
                <span class="work-item-desc">${w.description}</span>
                <span class="work-item-cost">${w.cost>0?'£'+w.cost.toFixed(2):'—'}</span>
              </div>`).join('')}
            ${grandTotal>0?`<div class="work-total">Total (inc. VAT): £${grandTotal.toFixed(2)}</div>`:''}
          </div>` : ''}

          <!-- Health check results -->
          ${r.checks && r.checks.length ? `
          <div class="detail-section">
            <div class="detail-title">Health Check Results</div>
            ${r.checks.map(c=>`
              <div class="check-item">
                <div>
                  <div class="check-name">${c.item}</div>
                  ${c.notes?`<div class="check-notes-text">${c.notes}</div>`:''}
                </div>
                <span class="check-result pill ${c.result==='pass'?'pill-pass':c.result==='advisory'?'pill-advisory':'pill-fail'}">
                  ${c.result==='pass'?'✓ Pass':c.result==='advisory'?'⚠ Advisory':'✗ Fail'}
                </span>
              </div>`).join('')}
          </div>` : ''}

          <!-- Vehicle photos -->
          ${r.photos && r.photos.length ? `
          <div class="detail-section">
            <div class="detail-title">Photos (${r.photos.length})</div>
            <div class="photo-grid">
              ${r.photos.map((p,i)=>`
                <div class="photo-item">
                  <img src="${p.data}" alt="Photo ${i+1}" onclick="openLightbox('${r.id}', ${i})">
                  ${p.caption ? `<div class="photo-item-caption">${p.caption}</div>` : ''}
                </div>`).join('')}
            </div>
          </div>` : ''}

          <!-- Advisory notes -->
          ${r.advisoryNotes ? `
          <div class="detail-section">
            <div class="detail-title">Advisory Notes</div>
            <div class="advisory-box">${r.advisoryNotes}</div>
          </div>` : ''}

          <!-- Next service -->
          ${(r.nextServiceDate||r.nextServiceMileage) ? `
          <div class="detail-section">
            <div class="detail-title">Next Service</div>
            <div style="font-size:0.88rem;color:var(--chrome);">
              ${r.nextServiceDate?'📅 '+r.nextServiceDate:''} ${r.nextServiceMileage?'· '+r.nextServiceMileage+' miles':''}
            </div>
          </div>` : ''}

          <div class="report-actions">
            <button class="btn btn-ghost" style="font-size:0.75rem;" onclick="printReport('${r.id}')">🖨 Print Report</button>
            <button class="btn btn-ghost" style="font-size:0.75rem;border-color:rgba(212,43,43,0.4);color:var(--red);" onclick="deleteReport('${r.id}')">🗑 Delete</button>
          </div>
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  if(card) card.classList.toggle('open');
}

function openLightbox(reportId, photoIndex) {
  const reports = loadReports();
  const r = reports.find(x=>x.id===reportId);
  if(!r || !r.photos || !r.photos[photoIndex]) return;
  document.getElementById('lightboxImg').src = r.photos[photoIndex].data;
  document.getElementById('photoLightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('photoLightbox').classList.remove('open');
}


function printReport(id) {
  const reports = loadReports();
  const r = reports.find(x=>x.id===id);
  if(!r) { window.print(); return; }

  const win = window.open('', '_blank');
  const checkRows = (r.checks||[]).map(c=>`
    <tr>
      <td style="padding:5px 8px;border-bottom:1px solid #eee;">${c.item}</td>
      <td style="padding:5px 8px;border-bottom:1px solid #eee;">
        <span style="padding:2px 8px;font-size:11px;font-weight:700;background:${c.result==='pass'?'#d4edda':c.result==='advisory'?'#fff3cd':'#f8d7da'};color:${c.result==='pass'?'#155724':c.result==='advisory'?'#856404':'#721c24'};">
          ${c.result==='pass'?'✓ Pass':c.result==='advisory'?'⚠ Advisory':'✗ Fail'}
        </span>
        ${c.notes?'<br><span style="font-size:11px;color:#888;font-style:italic;">'+c.notes+'</span>':''}
      </td>
    </tr>`).join('');

  const workRows = (r.workItems||[]).map(w=>`
    <tr>
      <td style="padding:5px 8px;border-bottom:1px solid #eee;">${w.description}</td>
      <td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:right;">${w.cost>0?'£'+w.cost.toFixed(2):'—'}</td>
    </tr>`).join('');

  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Service Report — ${r.reg||''}</title>
  <style>body{font-family:Arial,sans-serif;padding:2rem;max-width:700px;margin:0 auto;color:#111;font-size:13px;}
  h1{font-size:1.6rem;font-weight:900;text-transform:uppercase;}h1 span{color:#d42b2b;}
  table{width:100%;border-collapse:collapse;margin-bottom:1rem;}
  th{background:#f0f0f0;padding:5px 8px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#666;border-bottom:2px solid #ddd;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:#d42b2b;border-bottom:1px solid #d42b2b;padding:6px 0 4px;margin:12px 0 6px;font-weight:700;}
  @media print{.no-print{display:none;}}</style>
  </head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:3px solid #d42b2b;">
    <div><h1>AUTO <span>SERVICES</span></h1><div style="font-size:11px;color:#888;">Professional Car Servicing & Brake Specialists</div></div>
    <div style="text-align:right;"><div style="font-size:1.2rem;font-weight:900;color:#d42b2b;">SERVICE REPORT</div><div style="font-size:11px;color:#888;">Date: ${r.date||''}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
    <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:3px;">Customer</div><strong>${r.customer||'—'}</strong>${r.phone?'<br>'+r.phone:''}</div>
    <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:3px;">Vehicle</div>
    <strong style="background:#111;color:#fff;padding:1px 8px;letter-spacing:1px;">${r.reg||'—'}</strong> ${r.makeModel||''} ${r.carYear||''}<br>${r.mileage?r.mileage+' miles':''}</div>
  </div>
  ${workRows?`<div class="section-title">Work Carried Out</div><table><thead><tr><th>Description</th><th style="text-align:right;">Amount</th></tr></thead><tbody>${workRows}${r.grandTotal>0?`<tr><td colspan="2" style="text-align:right;font-weight:900;color:#d42b2b;padding:6px 8px;">Total (inc. VAT): £${r.grandTotal.toFixed(2)}</td></tr>`:''}</tbody></table>`:''}
  ${checkRows?`<div class="section-title">Health Check</div><table><thead><tr><th>Item</th><th>Result</th></tr></thead><tbody>${checkRows}</tbody></table>`:''}
  ${(r.photos&&r.photos.length)?`<div class="section-title">Photos</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1rem;">${r.photos.map(p=>`<div style="border:1px solid #ddd;"><img src="${p.data}" style="width:100%;height:100px;object-fit:cover;display:block;">${p.caption?`<div style="font-size:9px;color:#555;padding:3px 5px;border-top:1px solid #eee;">${p.caption}</div>`:''}</div>`).join('')}</div>`:''}
  ${r.advisoryNotes?`<div class="section-title">Advisory Notes</div><div style="background:#fff8f0;border-left:3px solid #d42b2b;padding:0.6rem 0.75rem;font-size:12px;line-height:1.6;">${r.advisoryNotes}</div>`:''}
  <div class="no-print" style="text-align:center;margin-top:2rem;">
    <button onclick="window.print()" style="background:#d42b2b;color:#fff;border:none;padding:0.7rem 2rem;font-size:1rem;cursor:pointer;margin-right:1rem;">🖨 Print / Save PDF</button>
    <button onclick="window.close()" style="background:#eee;border:none;padding:0.7rem 2rem;font-size:1rem;cursor:pointer;">Close</button>
  </div>
  </body></html>`);
  win.document.close();
}

function exportCSV() {
  const reports = loadReports();
  if(!reports.length) { alert('No reports to export.'); return; }
  let csv = 'Date,Reg,Customer,Make/Model,Mileage,Service Type,Technician,Pass,Advisory,Fail,Total (£),Advisory Notes\n';
  reports.forEach(r => {
    const total = r.grandTotal || 0;
    csv += `"${r.date||''}","${r.reg||''}","${r.customer||''}","${r.makeModel||''}","${r.mileage||''}","${r.serviceType||''}","${r.techName||''}","${r.pass||0}","${r.advisory||0}","${r.fail||0}","${total.toFixed(2)}","${(r.advisoryNotes||'').replace(/"/g,"'")}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'service-report-tracker.csv';
  a.click();
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if(USERS[user] && USERS[user]===pass) {
    document.getElementById('loginScreen').classList.add('hidden');
    sessionStorage.setItem('tracker_auth', user);
    err.classList.remove('show');
    init();
  } else {
    err.classList.add('show');
    document.getElementById('loginPass').value='';
  }
}

function signOut() {
  sessionStorage.removeItem('tracker_auth');
  location.reload();
}

function init() {
  setSyncStatus('Loading…', '');
  renderReports();
  // Try to pull from Supabase
  setTimeout(()=>{
    pullReports();
    setInterval(pullReports, 30000);
  }, 1000);
}

if(sessionStorage.getItem('tracker_auth') && USERS[sessionStorage.getItem('tracker_auth')]) {
  document.getElementById('loginScreen').classList.add('hidden');
  init();
}
</script>
</body>
</html>
